# ============================================================
# Profile: 单张 RTX 5080 (16GB) — 全部模型共享单卡
# ============================================================
# Gemma-4 E2B (~2.3B, INT4 <1.5GB) + BGE-M3 (~6GB) +
# Whisper-large-v3 (~4GB) + CosyVoice2 (~4GB) ≈ 15.5GB
# 16GB 显存紧张，已调低 batch_size / context_window / gpu_memory_utilization。
# ============================================================

profile:
  name: single-gpu
  description: 单张 RTX 5080 (16GB) 部署全部模型，适合开发测试环境

deployment:
  mode: native

gpus:
  count: 1
  models:
    - NVIDIA RTX 5080
  memory_per_gpu_gb: 16

models_dir: ./models

services:
  llm:
    model: google/gemma-4-e2b-it
    gpu_device: 0
    tensor_parallel_size: 1
    quantization: int4
    context_window: 2048
    max_num_seqs: 1
    gpu_memory_utilization: 0.75
    kv_cache_dtype: auto

  embedding:
    model: BAAI/bge-m3
    gpu_device: 0
    batch_size: 8
    max_length: 8192

  asr:
    model: large-v3
    gpu_device: 0
    vad_threshold: 0.5
    language: zh

  tts:
    model: CosyVoice2-0.5B
    gpu_device: 0
    default_voice: default
    sample_rate: 24000
