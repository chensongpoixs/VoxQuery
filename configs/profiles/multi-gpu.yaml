# ============================================================
# Profile: 4×RTX 4090 (24GB×4) — 分布式 GPU 部署
# ============================================================
# GPU 0,1 -> Gemma-3 27B (TP=2, ~22GB×2)
# GPU 2   -> BGE-M3 (~6GB)
# GPU 3   -> Whisper-v3 (~4GB) + CosyVoice2 (~4GB) 共享
# ============================================================

profile:
  name: multi-gpu
  description: 4×RTX 4090 (24GB×4) 分布式部署，适合生产环境

deployment:
  mode: docker

gpus:
  count: 4
  models:
    - NVIDIA RTX 4090
    - NVIDIA RTX 4090
    - NVIDIA RTX 4090
    - NVIDIA RTX 4090
  memory_per_gpu_gb: 24

models_dir: ./models

services:
  llm:
    model: google/gemma-3-27b-it
    gpu_device: [0, 1]
    tensor_parallel_size: 2
    quantization: awq
    context_window: 8192
    max_num_seqs: 4
    gpu_memory_utilization: 0.90
    kv_cache_dtype: fp8

  embedding:
    model: BAAI/bge-m3
    gpu_device: 2
    batch_size: 32
    max_length: 8192

  asr:
    model: large-v3
    gpu_device: 3
    vad_threshold: 0.5
    language: zh

  tts:
    model: CosyVoice2-0.5B
    gpu_device: 3
    default_voice: default
    sample_rate: 24000
