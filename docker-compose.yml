version: "3.9"

# ============================================================
# 知识库问答系统 - Docker Compose 编排（基础模板）
# GPU 分配通过 docker-compose.override.yml 注入（由 make config 生成）
# 运行 'make config' 从 profile 自动生成 GPU 绑定配置
# ============================================================

services:
  # ========== 基础设施 ==========

  redis:
    image: redis:7-alpine
    container_name: kb-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - kb-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: kb-chromadb
    ports:
      - "8004:8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - kb-net
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ========== 模型推理服务 ==========

  llm-service:
    build:
      context: ./services/llm-service
      dockerfile: Dockerfile
    container_name: kb-llm
    ports:
      - "8001:8001"
    volumes:
      - ${MODELS_DIR:-./models}/gemma3:/models/gemma3
      - ./services/llm-service/app:/app
    networks:
      - kb-net
    environment:
      - CUDA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES_LLM:-0,1}
      - MODEL_NAME=${LLM_MODEL_NAME:-google/gemma-3-27b-it}
      - MAX_TOKENS=${LLM_MAX_TOKENS:-2048}
      - TENSOR_PARALLEL_SIZE=${LLM_TENSOR_PARALLEL_SIZE:-2}
      - QUANTIZATION=${LLM_QUANTIZATION:-awq}
      - MAX_CONCURRENT=${LLM_MAX_CONCURRENT:-4}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  embedding-service:
    build:
      context: ./services/embedding-service
      dockerfile: Dockerfile
    container_name: kb-embedding
    ports:
      - "8002:8002"
    volumes:
      - ${MODELS_DIR:-./models}/bge-m3:/models/bge-m3
      - ./services/embedding-service/app:/app
    networks:
      - kb-net
    environment:
      - CUDA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES_EMBEDDING:-2}
      - MODEL_NAME=${EMBEDDING_MODEL_NAME:-BAAI/bge-m3}
      - MAX_LENGTH=${EMBEDDING_MAX_LENGTH:-8192}
      - BATCH_SIZE=${EMBEDDING_BATCH_SIZE:-32}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  asr-service:
    build:
      context: ./services/asr-service
      dockerfile: Dockerfile
    container_name: kb-asr
    ports:
      - "8005:8005"
    volumes:
      - ${MODELS_DIR:-./models}/whisper:/models/whisper
      - ./services/asr-service/app:/app
    networks:
      - kb-net
    environment:
      - CUDA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES_ASR_TTS:-3}
      - MODEL_NAME=${ASR_MODEL_NAME:-large-v3}
      - DEFAULT_LANGUAGE=${ASR_LANGUAGE:-zh}
      - VAD_THRESHOLD=${ASR_VAD_THRESHOLD:-0.5}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  tts-service:
    build:
      context: ./services/tts-service
      dockerfile: Dockerfile
    container_name: kb-tts
    ports:
      - "8006:8006"
    volumes:
      - ${MODELS_DIR:-./models}/cosyvoice2:/models/cosyvoice2
      - ./services/tts-service/app:/app
    networks:
      - kb-net
    environment:
      - CUDA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES_ASR_TTS:-3}
      - DEFAULT_VOICE=${TTS_DEFAULT_VOICE:-default}
      - SAMPLE_RATE=${TTS_SAMPLE_RATE:-24000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    restart: unless-stopped

  # ========== 业务服务 ==========

  rag-service:
    build:
      context: ./services/rag-service
      dockerfile: Dockerfile
    container_name: kb-rag
    ports:
      - "8003:8003"
    volumes:
      - ./services/rag-service/app:/app
      - ./knowledge-base/dicts:/app/dicts
    networks:
      - kb-net
    environment:
      - EMBEDDING_SERVICE_URL=http://embedding-service:8002
      - CHROMA_HOST=${CHROMA_HOST:-chromadb}
      - CHROMA_PORT=${CHROMA_PORT:-8004}
      - CHROMA_COLLECTION=${CHROMA_COLLECTION_NAME:-kb_knowledge}
      - TOP_K=${RAG_TOP_K:-5}
      - RERANK_TOP_N=${RAG_RERANK_TOP_N:-3}
      - SIMILARITY_THRESHOLD=${RAG_SIMILARITY_THRESHOLD:-0.65}
      - CHUNK_SIZE=${KNOWLEDGE_CHUNK_SIZE:-512}
      - CHUNK_OVERLAP=${KNOWLEDGE_CHUNK_OVERLAP:-50}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - RETRIEVAL_CACHE_TTL=${RETRIEVAL_CACHE_TTL:-3600}
    depends_on:
      chromadb:
        condition: service_healthy
      embedding-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: kb-api-gateway
    ports:
      - "8000:8000"
    volumes:
      - ./services/api-gateway/app:/app
      - ./knowledge-base:/app/knowledge-base
    networks:
      - kb-net
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-default-secret}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-1440}
      - LLM_SERVICE_URL=http://llm-service:8001
      - EMBEDDING_SERVICE_URL=http://embedding-service:8002
      - RAG_SERVICE_URL=http://rag-service:8003
      - ASR_SERVICE_URL=http://asr-service:8005
      - TTS_SERVICE_URL=http://tts-service:8006
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - CONVERSATION_TTL=${CONVERSATION_TTL:-86400}
    depends_on:
      llm-service:
        condition: service_healthy
      rag-service:
        condition: service_healthy
      asr-service:
        condition: service_healthy
      tts-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ========== 前端 ==========

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kb-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - kb-net
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

networks:
  kb-net:
    driver: bridge

volumes:
  redis-data:
  chroma-data:
