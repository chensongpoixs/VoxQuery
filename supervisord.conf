[program:rag-service]
command=python services/rag-service/app/main.py
directory=/mnt/d/Work/AI/AGIC/aigic
environment=EMBEDDING_SERVICE_URL="http://localhost:8002",CHROMA_HOST="localhost",CHROMA_PORT="8004",CHROMA_COLLECTION="kb_knowledge",TOP_K="5",RERANK_TOP_N="3",SIMILARITY_THRESHOLD="0.65",REDIS_HOST="localhost",REDIS_PORT="6379",PORT="8003"
