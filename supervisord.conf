autostart=true
autorestart=true
startsecs=5
startretries=3
stopwaitsecs=10
stopsignal=TERM
redirect_stderr=true
stdout_logfile=/tmp/rag-service.log
stdout_logfile_maxbytes=50MB


[program:api-gateway]
command=uvicorn services.api-gateway.app.main:app --host 0.0.0.0 --port 8000
directory=/mnt/d/Work/AI/AGIC/aigic
environment=LLM_SERVICE_URL="http://localhost:8001",EMBEDDING_SERVICE_URL="http://localhost:8002",RAG_SERVICE_URL="http://localhost:8003",ASR_SERVICE_URL="http://localhost:8005",TTS_SERVICE_URL="http://localhost:8006",REDIS_HOST="localhost",REDIS_PORT="6379",CONVERSATION_TTL="86400",PORT="8000"
