<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" style="background:#f8fafc">

  <!-- ========== 样式定义 ========== -->
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#2d4a6f"/>
    </linearGradient>
    <linearGradient id="gatewayGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="llmGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="ragGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="asrGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="ttsGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="dataGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowDown" markerWidth="10" markerHeight="10" refX="5" refY="10" orient="auto">
      <path d="M0,0 L5,10 L10,0" fill="#94a3b8" stroke="none"/>
    </marker>
    <marker id="arrowDownBlue" markerWidth="10" markerHeight="10" refX="5" refY="10" orient="auto">
      <path d="M0,0 L5,10 L10,0" fill="#3b82f6" stroke="none"/>
    </marker>
  </defs>

  <!-- ========== 标题栏 ========== -->
  <rect x="0" y="0" width="1200" height="60" fill="url(#headerGrad)"/>
  <text x="600" y="28" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold" font-family="sans-serif">企业内部知识库问答系统 + 语音对话助手 — 架构总览</text>
  <text x="600" y="48" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="sans-serif">ASR → LLM+RAG → TTS 三阶段流水线 | 4×RTX 4090 | 完全私有化部署</text>

  <!-- ========== 第一层: 用户交互层 ========== -->
  <rect x="50" y="80" width="1100" height="70" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="600" y="105" text-anchor="middle" fill="#1e293b" font-size="16" font-weight="bold" font-family="sans-serif">用户交互层</text>

  <!-- Web UI -->
  <rect x="150" y="115" width="200" height="28" rx="6" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="1"/>
  <text x="250" y="134" text-anchor="middle" fill="#3b82f6" font-size="13" font-weight="bold" font-family="sans-serif">🌐 Web UI (Next.js)</text>

  <!-- Mobile -->
  <rect x="400" y="115" width="180" height="28" rx="6" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="1"/>
  <text x="490" y="134" text-anchor="middle" fill="#3b82f6" font-size="13" font-family="sans-serif">📱 移动端</text>

  <!-- API -->
  <rect x="630" y="115" width="200" height="28" rx="6" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="1"/>
  <text x="730" y="134" text-anchor="middle" fill="#3b82f6" font-size="13" font-family="sans-serif">🔌 第三方 API 集成</text>

  <!-- 端口标注 -->
  <rect x="890" y="112" width="240" height="24" rx="4" fill="#e2e8f0"/>
  <text x="1010" y="128" text-anchor="middle" fill="#64748b" font-size="11" font-family="monospace">HTTP / SSE / WebSocket</text>

  <!-- 连接线: 用户层 → API Gateway -->
  <line x1="600" y1="150" x2="600" y2="185" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrowDownBlue)"/>

  <!-- ========== 第二层: API Gateway ========== -->
  <rect x="100" y="190" width="1000" height="130" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <rect x="100" y="190" width="1000" height="36" rx="10" fill="url(#gatewayGrad)"/>
  <rect x="100" y="210" width="1000" height="16" fill="url(#gatewayGrad)"/>
  <text x="600" y="214" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold" font-family="sans-serif">API Gateway (FastAPI) — Port 8000</text>

  <!-- Gateway 子模块 -->
  <rect x="125" y="238" width="175" height="36" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="212" y="260" text-anchor="middle" fill="#1d4ed8" font-size="12" font-family="sans-serif">💬 对话路由 /chat</text>

  <rect x="315" y="238" width="175" height="36" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="402" y="260" text-anchor="middle" fill="#1d4ed8" font-size="12" font-family="sans-serif">🎤 语音路由 /voice</text>

  <rect x="505" y="238" width="175" height="36" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="592" y="260" text-anchor="middle" fill="#1d4ed8" font-size="12" font-family="sans-serif">📚 知识路由 /knowledge</text>

  <rect x="695" y="238" width="175" height="36" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="782" y="260" text-anchor="middle" fill="#1d4ed8" font-size="12" font-family="sans-serif">⚙️ 管理路由 /admin</text>

  <rect x="885" y="238" width="195" height="36" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="982" y="260" text-anchor="middle" fill="#92400e" font-size="12" font-family="sans-serif">🛡️ Auth + Log 中间件</text>

  <!-- Gateway 核心功能 -->
  <rect x="125" y="280" width="955" height="32" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="600" y="300" text-anchor="middle" fill="#64748b" font-size="11" font-family="sans-serif">对话管理 (多轮记忆/指代消解) | 请求路由调度 | 流式 SSE 响应 | 推理队列管理 | Redis 会话存储</text>

  <!-- 连接线: Gateway → 下游服务 -->
  <line x1="280" y1="320" x2="280" y2="365" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="435" y1="320" x2="435" y2="365" stroke="#059669" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="655" y1="320" x2="655" y2="365" stroke="#ea580c" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="825" y1="320" x2="825" y2="365" stroke="#0891b2" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- ========== 第三层: 模型推理服务 ========== -->
  <text x="600" y="348" text-anchor="middle" fill="#475569" font-size="13" font-weight="bold" font-family="sans-serif">模型推理服务层</text>

  <!-- LLM Service -->
  <rect x="60" y="370" width="440" height="140" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="370" width="440" height="32" rx="10" fill="url(#llmGrad)"/>
  <rect x="60" y="388" width="440" height="14" fill="url(#llmGrad)"/>
  <text x="280" y="391" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold" font-family="sans-serif">🧠 LLM 推理服务 (Port 8001)</text>

  <text x="80" y="422" fill="#475569" font-size="12" font-family="sans-serif">模型: Gemma-3 27B (Google)</text>
  <text x="80" y="442" fill="#475569" font-size="12" font-family="sans-serif">引擎: vLLM + 张量并行 (TP=2)</text>
  <text x="80" y="462" fill="#475569" font-size="12" font-family="sans-serif">量化: AWQ INT8 | KV Cache: FP8</text>
  <text x="80" y="482" fill="#475569" font-size="12" font-family="sans-serif">上下文: 8192 tokens | 并发: 4</text>

  <rect x="60" y="492" width="440" height="18" rx="4" fill="#faf5ff" stroke="#e9d5ff" stroke-width="0.5"/>
  <text x="280" y="505" text-anchor="middle" fill="#7c3aed" font-size="12" font-weight="bold" font-family="monospace">🖥️ GPU 0 + GPU 1 (RTX 4090 ×2, ~22GB each)</text>

  <!-- RAG Service -->
  <rect x="280" y="530" width="440" height="140" rx="10" fill="#ffffff" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <rect x="280" y="530" width="440" height="32" rx="10" fill="url(#ragGrad)"/>
  <rect x="280" y="548" width="440" height="14" fill="url(#ragGrad)"/>
  <text x="500" y="551" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold" font-family="sans-serif">🔍 RAG 检索增强服务 (Port 8003)</text>

  <text x="300" y="582" fill="#475569" font-size="12" font-family="sans-serif">检索引擎: 多路召回 + Re-rank 精排</text>
  <text x="300" y="602" fill="#475569" font-size="12" font-family="sans-serif">文档分段: 固定/语义/滑动窗口 (3策略)</text>
  <text x="300" y="622" fill="#475569" font-size="12" font-family="sans-serif">同义词: 100+ 术语 | 50+ 同义词组</text>
  <text x="300" y="642" fill="#475569" font-size="12" font-family="sans-serif">格式: PDF / Word / TXT / MD / HTML</text>

  <!-- ASR Service -->
  <rect x="540" y="370" width="300" height="120" rx="10" fill="#ffffff" stroke="#ea580c" stroke-width="2" filter="url(#shadow)"/>
  <rect x="540" y="370" width="300" height="32" rx="10" fill="url(#asrGrad)"/>
  <rect x="540" y="388" width="300" height="14" fill="url(#asrGrad)"/>
  <text x="690" y="391" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold" font-family="sans-serif">🎤 ASR 语音识别 (Port 8005)</text>

  <text x="560" y="420" fill="#475569" font-size="12" font-family="sans-serif">模型: Whisper-large-v3</text>
  <text x="560" y="440" fill="#475569" font-size="12" font-family="sans-serif">接口: REST + WebSocket 流式</text>
  <text x="560" y="460" fill="#475569" font-size="12" font-family="sans-serif">特性: VAD | 中英混合 | 流式解码</text>

  <rect x="540" y="478" width="300" height="12" rx="4" fill="#fff7ed" stroke="#fed7aa" stroke-width="0.5"/>
  <text x="690" y="487" text-anchor="middle" fill="#ea580c" font-size="10" font-weight="bold" font-family="monospace">🖥️ GPU 3 共享 (RTX 4090, ~4GB)</text>

  <!-- TTS Service -->
  <rect x="860" y="370" width="300" height="120" rx="10" fill="#ffffff" stroke="#0891b2" stroke-width="2" filter="url(#shadow)"/>
  <rect x="860" y="370" width="300" height="32" rx="10" fill="url(#ttsGrad)"/>
  <rect x="860" y="388" width="300" height="14" fill="url(#ttsGrad)"/>
  <text x="1010" y="391" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold" font-family="sans-serif">🔊 TTS 语音合成 (Port 8006)</text>

  <text x="880" y="420" fill="#475569" font-size="12" font-family="sans-serif">模型: CosyVoice2 (阿里通义)</text>
  <text x="880" y="440" fill="#475569" font-size="12" font-family="sans-serif">特性: 零样本音色克隆</text>
  <text x="880" y="460" fill="#475569" font-size="12" font-family="sans-serif">输出: 流式分句合成 | 3内置音色</text>

  <rect x="860" y="478" width="300" height="12" rx="4" fill="#f0fdfa" stroke="#99f6e4" stroke-width="0.5"/>
  <text x="1010" y="487" text-anchor="middle" fill="#0891b2" font-size="10" font-weight="bold" font-family="monospace">🖥️ GPU 3 共享 (RTX 4090, ~4GB)</text>

  <!-- 连接线: RAG → Embedding + ChromaDB -->
  <line x1="500" y1="670" x2="350" y2="720" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowDown)"/>
  <line x1="500" y1="670" x2="650" y2="720" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowDown)"/>

  <!-- ========== 第四层: 数据与存储层 ========== -->
  <text x="600" y="708" text-anchor="middle" fill="#475569" font-size="13" font-weight="bold" font-family="sans-serif">数据与存储层</text>

  <!-- Embedding Service -->
  <rect x="100" y="725" width="250" height="110" rx="10" fill="#ffffff" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="100" y="725" width="250" height="30" rx="10" fill="#6366f1"/>
  <rect x="100" y="742" width="250" height="13" fill="#6366f1"/>
  <text x="225" y="745" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold" font-family="sans-serif">🧬 Embedding 服务 (Port 8002)</text>
  <text x="120" y="777" fill="#475569" font-size="12" font-family="sans-serif">模型: BGE-M3 (BAAI)</text>
  <text x="120" y="797" fill="#475569" font-size="12" font-family="sans-serif">维度: 1024 | 长度: 8192</text>
  <text x="120" y="817" fill="#475569" font-size="12" font-family="sans-serif">批量: 32 | 归一化输出</text>
  <rect x="100" y="825" width="250" height="10" rx="4" fill="#eef2ff" stroke="#c7d2fe" stroke-width="0.5"/>
  <text x="225" y="833" text-anchor="middle" fill="#6366f1" font-size="10" font-weight="bold" font-family="monospace">🖥️ GPU 2 (RTX 4090, ~6GB)</text>

  <!-- ChromaDB -->
  <rect x="380" y="725" width="250" height="110" rx="10" fill="#ffffff" stroke="#64748b" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="380" y="725" width="250" height="30" rx="10" fill="url(#dataGrad)"/>
  <rect x="380" y="742" width="250" height="13" fill="url(#dataGrad)"/>
  <text x="505" y="745" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold" font-family="sans-serif">🗄️ ChromaDB (Port 8004)</text>
  <text x="400" y="777" fill="#475569" font-size="12" font-family="sans-serif">向量数据库</text>
  <text x="400" y="797" fill="#475569" font-size="12" font-family="sans-serif">索引: HNSW | 度量: Cosine</text>
  <text x="400" y="817" fill="#475569" font-size="12" font-family="sans-serif">持久化卷</text>

  <!-- Redis -->
  <rect x="660" y="725" width="220" height="110" rx="10" fill="#ffffff" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="660" y="725" width="220" height="30" rx="10" fill="#dc2626"/>
  <rect x="660" y="742" width="220" height="13" fill="#dc2626"/>
  <text x="770" y="745" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold" font-family="sans-serif">⚡ Redis (Port 6379)</text>
  <text x="680" y="777" fill="#475569" font-size="12" font-family="sans-serif">对话历史缓存</text>
  <text x="680" y="797" fill="#475569" font-size="12" font-family="sans-serif">检索结果缓存</text>
  <text x="680" y="817" fill="#475569" font-size="12" font-family="sans-serif">TTL: 1h-24h</text>

  <!-- ========== 底部信息 ========== -->
  <rect x="50" y="860" width="1100" height="30" rx="6" fill="#1a2332" opacity="0.05"/>
  <text x="600" y="880" text-anchor="middle" fill="#64748b" font-size="11" font-family="sans-serif">Docker Compose 编排 | GPU 精确绑定 | 容器互联 | 健康检查 | 异常自动重启 | 完全私有化部署</text>

</svg>
