services:
  llm-service:
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                device_ids: ["0", "1"]
                capabilities: [gpu]

  embedding-service:
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                device_ids: ["2"]
                capabilities: [gpu]

  asr-service:
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                device_ids: ["3"]
                capabilities: [gpu]

  tts-service:
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                device_ids: ["3"]
                capabilities: [gpu]
